
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Lost & Found Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

   body {
    background-image: url(lostfoundweb\WhatsApp\ Image\ 2026-07-02\ at\ 3.31.44\ PM.jpeg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    /* REMOVE this line: background: #F1EFE8; */
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backface-visibility: visible;
}

     .login-wrapper {
            max-width: 420px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.70);
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(12, 68, 124, 0.08);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.2s;
        }

        .form-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        /* ----- LOGO STYLES (CIRCLE, NO WHITE BG) ----- */
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.6rem;
        }

        .logo-wrapper .logo-img {
            max-height: 100px;
            width: 100px;
            height: 100px;
            display: block;
            border-radius: 50%;           /* <-- circle shape */
            object-fit: cover;            /* ensures image fills circle nicely */
            background: transparent;       /* no white background */
            box-shadow: 0 6px 20px rgba(24, 95, 165, 0.18);
            transition: transform 0.2s;
            border: none;                 /* remove any border */
        }

        .logo-wrapper .logo-img:hover {
            transform: scale(1.05);
        }

        .logo-wrapper .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0C447C;
            letter-spacing: -0.5px;
        }

        .logo-wrapper .logo-text span {
            font-weight: 300;
            color: #5F5E5A;
        }
        /* ----- end logo styles ----- */

        .form-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1eb793;
            margin-top: 0.2rem;
        }

        .form-header p {
            color: #5F5E5A;
            font-size: 0.85rem;
            margin-top: 0.1rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .input-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #2C2C2A;
        }
        .input-field {
            position: relative;
            display: flex;
            align-items: center;
            background: #F1EFE8;
            border: 1.5px solid #B5D4F4;
            border-radius: 60px;
            padding: 0 1rem;
            transition: 0.2s;
        }
        .input-field:focus-within {
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.10);
            background: white;
        }
        .input-field i {
            color: #5F5E5A;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            width: 1rem;
            text-align: center;
        }
        .input-field input {
            border: none;
            background: transparent;
            padding: 0.6rem 0;
            width: 100%;
            font-size: 0.9rem;
            outline: none;
            color: #2C2C2A;
        }
        .input-field input::placeholder {
            color: #afafa2;
            font-size: 0.82rem;
        }
        .input-field .toggle-pw {
            cursor: pointer;
            color: #5F5E5A;
            font-size: 0.8rem;
            padding: 0.2rem;
            transition: color 0.2s;
        }
        .input-field .toggle-pw:hover {
            color: #185FA5;
        }

        .input-field.error {
            border-color: #E24B4A;
            background: #fff6f5;
        }
        .input-field.error:focus-within {
            box-shadow: 0 0 0 3px rgba(226, 75, 74, 0.12);
        }
        .error-message {
            color: #E24B4A;
            font-size: 0.7rem;
            padding-left: 1rem;
            min-height: 0.9rem;
            margin-top: 0.05rem;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            margin: 0.05rem 0 0.1rem;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #2C2C2A;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            accent-color: #185FA5;
            width: 0.85rem;
            height: 0.85rem;
            margin: 0;
        }
        .form-options a {
            color: #0d9488;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.78rem;
        }
        .form-options a:hover {
            text-decoration: underline;
            color: #0C447C;
        }

        .btn-login {
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0.65rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            height: 42px;
            margin-top: 0.1rem;
        }
        .btn-login:hover {
            background: #0a7a70;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .btn-login .spinner {
            display: none;
            width: 0.95rem;
            height: 0.95rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-login.loading .spinner {
            display: inline-block;
        }
        .btn-login.loading .btn-text {
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #5F5E5A;
            font-size: 0.7rem;
            margin: 0.1rem 0;
        }
        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid #B5D4F4;
        }

        .register-cta {
            text-align: center;
            font-size: 0.82rem;
            color: #2C2C2A;
        }
        .register-cta a {
            color: #0d9488;
            font-weight: 600;
            text-decoration: none;
        }
        .register-cta a:hover {
            text-decoration: underline;
        }

        .captcha-note {
            font-size: 0.6rem;
            color: #5F5E5A;
            text-align: center;
            margin-top: 0.1rem;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            .login-wrapper {
                padding: 1.5rem 1.2rem 1.5rem;
                max-width: 380px;
            }
            .form-options {
                flex-wrap: wrap;
                gap: 0.2rem;
            }
            .form-header h2 {
                font-size: 1.3rem;
            }
            .logo-wrapper .logo-img {
                width: 80px;
                height: 80px;
                max-height: 80px;
            }
            .logo-wrapper .logo-text {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .login-wrapper {
                padding: 1.2rem 1rem 1.5rem;
                border-radius: 18px;
            }
            .logo-wrapper .logo-img {
                width: 70px;
                height: 70px;
                max-height: 70px;
            }
            .form-header h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="form-header">
            <!-- LOGO: CIRCLE, NO WHITE BG -->
            <div class="logo-wrapper">
                <img src="logo.png" alt="Lost & Found Logo" class="logo-img" />
                
            </div>
            <h2 style="color: #1eb793;">Welcome back!</h2>
        </div>

        <form class="login-form" id="loginForm" novalidate>
            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-field" id="emailField">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" autofocus required />
                </div>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-field" id="passwordField">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required />
                    <span class="toggle-pw" id="togglePw"><i class="fas fa-eye"></i></span>
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" id="rememberMe" /> Remember me
                </label>
                <a href="forgotpassword.html" id="forgotLink">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">Log in <i class="fas fa-arrow-right" style="margin-left: 0.2rem;"></i></span>
                <span class="spinner"></span>
            </button>

            <div class="divider">
                <hr /><span>or</span><hr />
            </div>

            <div class="register-cta">
                Don’t have an account? <a href="register.html">Register here</a>
            </div>

            <div class="captcha-note">
                <i class="fas fa-shield"></i> After 5 failed attempts, CAPTCHA will appear
            </div>
        </form>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailField = document.getElementById('emailField');
            const passwordField = document.getElementById('passwordField');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const loginBtn = document.getElementById('loginBtn');
            const togglePw = document.getElementById('togglePw');

            togglePw.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            emailInput.addEventListener('input', function() {
                clearFieldError(emailField, emailError);
            });
            passwordInput.addEventListener('input', function() {
                clearFieldError(passwordField, passwordError);
            });

            function clearFieldError(field, errorEl) {
                field.classList.remove('error');
                errorEl.textContent = '';
            }

            function setFieldError(field, errorEl, message) {
                field.classList.add('error');
                errorEl.textContent = message;
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                clearFieldError(emailField, emailError);
                clearFieldError(passwordField, passwordError);

                let isValid = true;
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!email) {
                    setFieldError(emailField, emailError, 'Email is required.');
                    isValid = false;
                } else if (!emailPattern.test(email)) {
                    setFieldError(emailField, emailError, 'Please enter a valid email address.');
                    isValid = false;
                }

                if (!password) {
                    setFieldError(passwordField, passwordError, 'Password is required.');
                    isValid = false;
                } else if (password.length < 6) {
                    setFieldError(passwordField, passwordError, 'Password must be at least 6 characters.');
                    isValid = false;
                }

                if (!isValid) {
                    if (emailField.classList.contains('error')) emailInput.focus();
                    else if (passwordField.classList.contains('error')) passwordInput.focus();
                    return;
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                setTimeout(() => {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;

                    if (email === 'admin@demo.com' && password === 'pass1234') {
                        alert('✅ Login successful! Redirecting to dashboard... (demo)');
                        window.location.href = '../user/userdashboard.html';
                    } else {
                        setFieldError(emailField, emailError, 'Incorrect email or password. Try again.');
                        passwordField.classList.add('error');
                        passwordError.textContent = 'Incorrect credentials.';
                        
                        const attemptCount = parseInt(sessionStorage.getItem('loginAttempt') || '0') + 1;
                        sessionStorage.setItem('loginAttempt', attemptCount);
                        if (attemptCount >= 5) {
                            alert('⚠️ Too many failed attempts. CAPTCHA would be shown (demo).');
                            sessionStorage.setItem('loginAttempt', '0');
                        }
                    }
                }, 800);
            });

            document.getElementById('forgotLink').addEventListener('click', function(e) {
                // Let the browser navigate
            });

            document.querySelector('.register-cta a').addEventListener('click', function(e) {
                // Let the browser navigate
            });

            window.addEventListener('load', function() {
                emailInput.focus();
            });
        })();
    </script>

</body>
</html>
