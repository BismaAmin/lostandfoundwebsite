<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Lost & Found Portal</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
   <style>
        
    /* ----- RESET & BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: #F1EFE8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ----- LOGIN CARD (single column, compact) ----- */
    .login-wrapper {
      max-width: 400px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(12, 68, 124, 0.08);
      padding: 1.8rem 2rem 2rem;
      transition: all 0.2s;
    }

    /* ----- FORM HEADER (compact) ----- */
    .form-header {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .form-header .logo-icon {
      font-size: 1.8rem;
      color: #185FA5;
      margin-bottom: 0.1rem;
    }
    .form-header h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0C447C;
    }
    .form-header p {
      color: #5F5E5A;
      font-size: 0.8rem;
      margin-top: 0.1rem;
    }

    /* ----- FORM ELEMENTS (tight) ----- */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .input-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #2C2C2A;
    }
    .input-field {
      position: relative;
      display: flex;
      align-items: center;
      background: #F1EFE8;
      border: 1.5px solid #B5D4F4;
      border-radius: 60px;
      padding: 0 1rem;
      transition: 0.2s;
    }
    .input-field:focus-within {
      border-color: #185FA5;
      box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.10);
      background: white;
    }
    .input-field i {
      color: #5F5E5A;
      font-size: 0.8rem;
      margin-right: 0.5rem;
      width: 1rem;
      text-align: center;
    }
    .input-field input {
      border: none;
      background: transparent;
      padding: 0.55rem 0;
      width: 100%;
      font-size: 0.88rem;
      outline: none;
      color: #2C2C2A;
    }
    .input-field input::placeholder {
      color: #9a9a96;
      font-size: 0.82rem;
    }
    .input-field .toggle-pw {
      cursor: pointer;
      color: #5F5E5A;
      font-size: 0.8rem;
      padding: 0.2rem;
      transition: color 0.2s;
    }
    .input-field .toggle-pw:hover {
      color: #185FA5;
    }

    /* error state */
    .input-field.error {
      border-color: #E24B4A;
      background: #fff6f5;
    }
    .input-field.error:focus-within {
      box-shadow: 0 0 0 3px rgba(226, 75, 74, 0.12);
    }
    .error-message {
      color: #E24B4A;
      font-size: 0.7rem;
      padding-left: 1rem;
      min-height: 0.9rem;
      margin-top: 0.05rem;
    }

    /* options row (compact) */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      margin: 0.05rem 0 0.1rem;
    }
    .form-options label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #2C2C2A;
      cursor: pointer;
    }
    .form-options label input[type="checkbox"] {
      accent-color: #185FA5;
      width: 0.85rem;
      height: 0.85rem;
      margin: 0;
    }
    .form-options a {
      color: #185FA5;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.78rem;
    }
    .form-options a:hover {
      text-decoration: underline;
      color: #0C447C;
    }

    /* login button (compact) */
    .btn-login {
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 0.6rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      height: 38px;
      margin-top: 0.1rem;
    }
    .btn-login:hover {
      background: #0C447C;
    }
    .btn-login:active {
      transform: scale(0.98);
    }
    .btn-login .spinner {
      display: none;
      width: 0.95rem;
      height: 0.95rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .btn-login.loading .spinner {
      display: inline-block;
    }
    .btn-login.loading .btn-text {
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* divider (compact) */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #5F5E5A;
      font-size: 0.7rem;
      margin: 0.1rem 0;
    }
    .divider hr {
      flex: 1;
      border: none;
      border-top: 1px solid #B5D4F4;
    }

    /* register CTA (compact) */
    .register-cta {
      text-align: center;
      font-size: 0.82rem;
      color: #2C2C2A;
    }
    .register-cta a {
      color: #185FA5;
      font-weight: 600;
      text-decoration: none;
    }
    .register-cta a:hover {
      text-decoration: underline;
    }

    /* captcha note (compact) */
    .captcha-note {
      font-size: 0.6rem;
      color: #5F5E5A;
      text-align: center;
      margin-top: 0.1rem;
      opacity: 0.7;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 480px) {
      .login-wrapper {
        padding: 1.5rem 1.2rem 1.5rem;
        border-radius: 16px;
      }
      .form-options {
        flex-wrap: wrap;
        gap: 0.2rem;
      }
      .form-header h3 {
        font-size: 1.1rem;
      }
    }
   </style>
</head>

<div class="login-wrapper">
  <!-- FORM HEADER -->
  <div class="form-header">
    <div class="logo-icon"><i class="fas fa-magnifying-glass-location"></i></div>
    <h3>Welcome back</h3>
    <p>Login to report or find lost items</p>
  </div>

  <!-- LOGIN FORM -->
  <form class="login-form" id="loginForm" novalidate>
    <!-- Email -->
    <div class="input-group">
      <label for="email">Email</label>
      <div class="input-field" id="emailField">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email" autofocus required />
      </div>
      <div class="error-message" id="emailError"></div>
    </div>

    <!-- Password -->
    <div class="input-group">
      <label for="password">Password</label>
      <div class="input-field" id="passwordField">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password" required />
        <span class="toggle-pw" id="togglePw"><i class="fas fa-eye"></i></span>
      </div>
      <div class="error-message" id="passwordError"></div>
    </div>

    <!-- Options: remember + forgot -->
    <div class="form-options">
      <label>
        <input type="checkbox" id="rememberMe" /> Remember me
      </label>
      <a href="forgotpassword.html" id="forgotLink">Forgot password?</a>
    </div>

    <!-- Login Button -->
    <button type="submit" class="btn-login" id="loginBtn">
      <span class="btn-text">Log in <i class="fas fa-arrow-right" style="margin-left: 0.2rem;"></i></span>
      <span class="spinner"></span>
    </button>

    <!-- Divider -->
    <div class="divider">
      <hr /><span>or</span><hr />
    </div>

    <!-- Register CTA -->
    <div class="register-cta">
      Don’t have an account? <a href="register.html">Register here</a>
    </div>

    <!-- CAPTCHA note -->
    <div class="captcha-note">
      <i class="fas fa-shield"></i> After 5 failed attempts, CAPTCHA will appear
    </div>
  </form>
</div>

<script>

        (function() {
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailField = document.getElementById('emailField');
    const passwordField = document.getElementById('passwordField');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const loginBtn = document.getElementById('loginBtn');
    const togglePw = document.getElementById('togglePw');

    // toggle password visibility
    togglePw.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });

    // clear errors on input
    emailInput.addEventListener('input', function() {
      clearFieldError(emailField, emailError);
    });
    passwordInput.addEventListener('input', function() {
      clearFieldError(passwordField, passwordError);
    });

    function clearFieldError(field, errorEl) {
      field.classList.remove('error');
      errorEl.textContent = '';
    }

    function setFieldError(field, errorEl, message) {
      field.classList.add('error');
      errorEl.textContent = message;
    }

    // form submit
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      clearFieldError(emailField, emailError);
      clearFieldError(passwordField, passwordError);

      let isValid = true;
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        setFieldError(emailField, emailError, 'Email is required.');
        isValid = false;
      } else if (!emailPattern.test(email)) {
        setFieldError(emailField, emailError, 'Please enter a valid email address.');
        isValid = false;
      }

      if (!password) {
        setFieldError(passwordField, passwordError, 'Password is required.');
        isValid = false;
      } else if (password.length < 6) {
        setFieldError(passwordField, passwordError, 'Password must be at least 6 characters.');
        isValid = false;
      }

      if (!isValid) {
        if (emailField.classList.contains('error')) emailInput.focus();
        else if (passwordField.classList.contains('error')) passwordInput.focus();
        return;
      }

      // simulate API call
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      setTimeout(() => {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;

        // Demo: admin@demo.com / pass1234
        if (email === 'admin@demo.com' && password === 'pass1234') {
          alert('✅ Login successful! Redirecting to dashboard... (demo)');
          window.location.href = 'index.html';
        } else {
          setFieldError(emailField, emailError, 'Incorrect email or password. Try again.');
          passwordField.classList.add('error');
          passwordError.textContent = 'Incorrect credentials.';
          
          const attemptCount = parseInt(sessionStorage.getItem('loginAttempt') || '0') + 1;
          sessionStorage.setItem('loginAttempt', attemptCount);
          if (attemptCount >= 5) {
            alert('⚠️ Too many failed attempts. CAPTCHA would be shown (demo).');
            sessionStorage.setItem('loginAttempt', '0');
          }
        }
      }, 800);
    });

    // forgot password
    document.getElementById('forgotLink').addEventListener('click', function(e) {
      alert('📧 Forgot password flow: you would receive a reset link (demo).');
      window.location.href = 'forgot-password.html';
    });

    // register
    document.querySelector('.register-cta a').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'register.html';
    });

    // auto focus
    window.addEventListener('load', function() {
      emailInput.focus();
    });
  })();

</script>
</body>
</html>
