
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password · Lost & Found Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background-image: url(WhatsApp\ Image\ 2026-07-02\ at\ 3.31.44\ PM.jpeg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            backface-visibility: visible;
        }

        .forgot-wrapper {
            max-width: 420px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.70);
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(12, 68, 124, 0.08);
            padding: 2rem 2rem 1.8rem;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }

        .form-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* ----- LOGO STYLES (CIRCLE, NO WHITE BG) - same as login page ----- */
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.6rem;
        }

        .logo-wrapper .logo-img {
            max-height: 100px;
            width: 100px;
            height: 100px;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            background: transparent;
            box-shadow: 0 6px 20px rgba(24, 95, 165, 0.18);
            transition: transform 0.2s;
            border: none;
        }

        .logo-wrapper .logo-img:hover {
            transform: scale(1.05);
        }

        .logo-wrapper .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0C447C;
            letter-spacing: -0.5px;
        }

        .logo-wrapper .logo-text span {
            font-weight: 300;
            color: #5F5E5A;
        }
        /* ----- end logo styles ----- */

        .form-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0C447C;
            margin-top: 0.2rem;
        }

        .form-header p {
            color: #5F5E5A;
            font-size: 0.82rem;
            margin-top: 0.1rem;
        }

        .forgot-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .input-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #2C2C2A;
        }

        .input-field {
            display: flex;
            align-items: center;
            background: #F1EFE8;
            border: 1.5px solid #B5D4F4;
            border-radius: 60px;
            padding: 0 1rem;
            transition: 0.2s;
            min-height: 42px;
        }

        .input-field:focus-within {
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.10);
            background: white;
        }

        .input-field i {
            color: #5F5E5A;
            font-size: 0.85rem;
            margin-right: 0.6rem;
            width: 1rem;
            text-align: center;
            flex-shrink: 0;
        }

        .input-field input {
            border: none;
            background: transparent;
            padding: 0.6rem 0;
            width: 100%;
            font-size: 0.9rem;
            outline: none;
            color: #2C2C2A;
        }

        .input-field input::placeholder {
            color: #afafa2;
            font-size: 0.82rem;
        }

        .input-field.error {
            border-color: #E24B4A;
            background: #fff6f5;
        }

        .input-field.error:focus-within {
            box-shadow: 0 0 0 3px rgba(226, 75, 74, 0.12);
        }

        .input-field.success {
            border-color: #1D9E75;
            background: #f0faf6;
        }

        .error-message {
            color: #E24B4A;
            font-size: 0.7rem;
            padding-left: 1rem;
            min-height: 0.9rem;
        }

        .info-message {
            color: #5F5E5A;
            font-size: 0.7rem;
            padding-left: 1rem;
            min-height: 0.9rem;
        }

        .btn-send {
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0.7rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.2rem;
        }

        .btn-send:hover {
            background: #0a7a70;
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        .btn-send:disabled {
            background: #B5D4F4;
            cursor: not-allowed;
        }

        .btn-send .spinner {
            display: none;
            width: 0.95rem;
            height: 0.95rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-send.loading .spinner {
            display: inline-block;
        }

        .btn-send.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-state {
            display: none;
            text-align: center;
            padding: 1.5rem 0 1rem;
            flex: 1;
        }

        .success-state.active {
            display: block;
        }

        .success-state .check-icon {
            font-size: 4rem;
            color: #1D9E75;
            margin-bottom: 0.5rem;
        }

        .success-state h4 {
            font-size: 1.1rem;
            color: #0C447C;
            margin-bottom: 0.2rem;
        }

        .success-state p {
            color: #5F5E5A;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }

        .success-state .resend-link {
            color: #0d9488;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            background: none;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .success-state .resend-link:hover {
            text-decoration: underline;
            color: #0a7a70;
        }

        .forgot-form.hidden {
            display: none;
        }

        .bottom-back {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(181, 212, 244, 0.4);
            text-align: center;
        }

        .bottom-back .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #5F5E5A;
            font-size: 0.82rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            transition: all 0.2s;
        }

        .bottom-back .back-link:hover {
            color: #0d9488;
            background: rgba(13, 148, 136, 0.08);
        }

        .bottom-back .back-link i {
            font-size: 0.7rem;
        }

        .bottom-back .back-link.hidden-link {
            display: none;
        }

        @media (max-width: 480px) {
            .forgot-wrapper {
                padding: 1.5rem 1.2rem 1.5rem;
                border-radius: 18px;
            }

            .logo-wrapper .logo-img {
                width: 80px;
                height: 80px;
                max-height: 80px;
            }

            .form-header h3 {
                font-size: 1rem;
            }

            .input-field {
                min-height: 38px;
            }

            .input-field input {
                font-size: 0.85rem;
                padding: 0.5rem 0;
            }

            .btn-send {
                height: 40px;
                font-size: 0.85rem;
            }

            .bottom-back {
                margin-top: 1.2rem;
                padding-top: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="forgot-wrapper">
        <div class="form-header">
            <!-- LOGO: CIRCLE, NO WHITE BG - exactly like login page -->
            <div class="logo-wrapper">
                <img src="cropped_circle_image.png" alt="Lost & Found Logo" class="logo-img" />
            </div>
            <h3>Forgot password?</h3>
            <p>Enter your email and we'll send you a reset link</p>
        </div>

        <form class="forgot-form" id="forgotForm" novalidate>
            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-field" id="emailField">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your registered email" required autofocus />
                </div>
                <div class="error-message" id="emailError"></div>
                <div class="info-message" id="emailInfo"></div>
            </div>

            <button type="submit" class="btn-send" id="sendBtn">
                <span class="btn-text">Send reset link <i class="fas fa-arrow-right" style="margin-left:0.2rem;"></i></span>
                <span class="spinner"></span>
            </button>
        </form>

        <div class="success-state" id="successState">
            <div class="check-icon"><i class="fas fa-check-circle"></i></div>
            <h4>Check your inbox!</h4>
            <p>We've sent a password reset link to <strong id="sentEmail"></strong></p>
            <p style="font-size:0.75rem; color:#5F5E5A; margin-top:0.2rem;">Link expires in 1 hour</p>
            <button class="resend-link" id="resendLink">Didn't receive it? Resend email</button>
        </div>

        <!-- Back to login moved to bottom -->
        <div class="bottom-back" id="bottomBack">
            <a href="login.html" class="back-link" id="backLink">
                <i class="fas fa-arrow-left"></i> Back to login
            </a>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('forgotForm');
            const emailInput = document.getElementById('email');
            const emailField = document.getElementById('emailField');
            const emailError = document.getElementById('emailError');
            const emailInfo = document.getElementById('emailInfo');
            const sendBtn = document.getElementById('sendBtn');
            const successState = document.getElementById('successState');
            const sentEmail = document.getElementById('sentEmail');
            const resendLink = document.getElementById('resendLink');
            const backLink = document.getElementById('backLink');
            const bottomBack = document.getElementById('bottomBack');

            const registeredEmails = ['test@demo.com', 'admin@demo.com', 'user@example.com'];

            function validateEmail() {
                const email = emailInput.value.trim();
                const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if (!email) {
                    clearError();
                    emailInfo.textContent = '';
                    return false;
                }

                if (!pattern.test(email)) {
                    setError('Please enter a valid email address.');
                    emailInfo.textContent = '';
                    return false;
                }

                clearError();
                emailInfo.textContent = '';
                return true;
            }

            function setError(message) {
                emailField.classList.add('error');
                emailField.classList.remove('success');
                emailError.textContent = message;
            }

            function clearError() {
                emailField.classList.remove('error');
                emailError.textContent = '';
            }

            emailInput.addEventListener('input', validateEmail);
            emailInput.addEventListener('blur', validateEmail);

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const email = emailInput.value.trim();

                if (!validateEmail()) {
                    emailInput.focus();
                    return;
                }

                const isRegistered = registeredEmails.includes(email.toLowerCase());

                sendBtn.classList.add('loading');
                sendBtn.disabled = true;

                setTimeout(() => {
                    sendBtn.classList.remove('loading');
                    sendBtn.disabled = false;

                    if (isRegistered) {
                        sentEmail.textContent = email;
                        form.classList.add('hidden');
                        successState.classList.add('active');
                        bottomBack.style.display = 'none';
                    } else {
                        setError('If this email is registered, you will receive a reset link.');
                        emailField.classList.remove('error');
                        emailField.classList.add('success');
                        emailInfo.textContent = '';
                        setTimeout(() => {
                            emailField.classList.remove('success');
                            emailError.textContent = '';
                        }, 4000);
                    }
                }, 1200);
            });

            resendLink.addEventListener('click', function() {
                const email = sentEmail.textContent;

                resendLink.textContent = 'Sending...';
                resendLink.style.color = '#5F5E5A';
                resendLink.style.cursor = 'default';

                setTimeout(() => {
                    resendLink.textContent = 'Resend email';
                    resendLink.style.color = '#0d9488';
                    resendLink.style.cursor = 'pointer';
                    alert('📧 Reset link resent to ' + email + ' (demo)');
                }, 1000);
            });

            backLink.addEventListener('click', function(e) {
                if (successState.classList.contains('active')) {
                    e.preventDefault();
                    successState.classList.remove('active');
                    form.classList.remove('hidden');
                    bottomBack.style.display = 'block';
                    emailInput.value = '';
                    emailInput.focus();
                    clearError();
                    emailInfo.textContent = '';
                    emailField.classList.remove('success');
                    return;
                }
                // Let the browser navigate
            });

            window.addEventListener('load', function() {
                emailInput.focus();
            });

            emailInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    form.dispatchEvent(new Event('submit'));
                }
            });

        })();
    </script>

</body>
</html>
